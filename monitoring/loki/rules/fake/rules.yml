groups:
  - name: example-log-alerts
    rules:
      - alert: HighErrorRateLogs
        expr: |
          count_over_time({container="toll_optimizer_app"} |= "ERROR" [5m]) > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected in app logs"
          description: "Found more than 10 errors in the last 5 minutes for {{ $labels.container }}."

  - name: csv-parser-alerts
    rules:
      - alert: UnknownEntryPointDetected
        expr: |
          sum by (container, entry_point) (
            count_over_time(
              {container="toll_optimizer_app"} 
              |= "Unknown entry point" 
              | json entry_point="fields.entry_point"
              [5m]
            )
          ) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Unknown entry point: {{ $labels.entry_point }}"
          description: "An unknown entry point '{{ $labels.entry_point }}' was encountered during CSV parsing in {{ $labels.container }}."

      - alert: UnknownExitPointDetected
        expr: |
          sum by (container, exit_point) (
            count_over_time(
              {container="toll_optimizer_app"} 
              |= "Unknown exit point" 
              | json exit_point="fields.exit_point"
              [5m]
            )
          ) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Unknown exit point: {{ $labels.exit_point }}"
          description: "An unknown exit point '{{ $labels.exit_point }}' was encountered during CSV parsing in {{ $labels.container }}."
