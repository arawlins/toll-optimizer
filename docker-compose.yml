services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toll_optimizer_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - RUST_LOG=${RUST_LOG:-info}
      - METRICS_USERNAME=${METRICS_USERNAME}
      - METRICS_PASSWORD=${METRICS_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: toll_optimizer_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus-config-init:
    image: alpine:latest
    container_name: toll_optimizer_prometheus_config_init
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template
      - prometheus_config:/etc/prometheus_generated
    environment:
      - METRICS_USERNAME=${METRICS_USERNAME}
      - METRICS_PASSWORD=${METRICS_PASSWORD}
    command: sh -c "apk add --no-cache gettext && envsubst < /etc/prometheus/prometheus.yml.template > /etc/prometheus_generated/prometheus.yml"

  alertmanager-config-init:
    image: alpine:latest
    container_name: toll_optimizer_alertmanager_config_init
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.template
      - alertmanager_config:/etc/alertmanager_generated
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    command: sh -c "apk add --no-cache gettext && envsubst < /etc/alertmanager/alertmanager.yml.template > /etc/alertmanager_generated/alertmanager.yml"

  prometheus:
    image: prom/prometheus:latest
    container_name: toll_optimizer_prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_config:/etc/prometheus
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    depends_on:
      app:
        condition: service_started
      alertmanager:
        condition: service_started
      prometheus-config-init:
        condition: service_completed_successfully

  alertmanager:
    image: prom/alertmanager:latest
    container_name: toll_optimizer_alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - alertmanager_config:/etc/alertmanager
    depends_on:
      alertmanager-config-init:
        condition: service_completed_successfully

  loki:
    image: grafana/loki:latest
    container_name: toll_optimizer_loki
    user: root
    restart: always
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - ./monitoring/loki/rules:/loki/rules
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: toll_optimizer_promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: toll_optimizer_grafana
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
      - loki

  caddy:
    image: caddy:2-alpine
    container_name: toll_optimizer_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  prometheus_data:
  prometheus_config:
  alertmanager_config:
  grafana_data:
  loki_data:
  caddy_data:
  caddy_config:
