services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toll_optimizer_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - RUST_LOG=${RUST_LOG:-info}
      - METRICS_USERNAME=${METRICS_USERNAME}
      - METRICS_PASSWORD=${METRICS_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: toll_optimizer_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: toll_optimizer_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template
      - prometheus_data:/prometheus
    environment:
      - METRICS_USERNAME=${METRICS_USERNAME}
      - METRICS_PASSWORD=${METRICS_PASSWORD}
    # Use sed for simple substitution since envsubst is not in the official prometheus image
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        sh -c "sed -e \"s/\$${METRICS_USERNAME}/$$METRICS_USERNAME/g\" -e \"s/\$${METRICS_PASSWORD}/$$METRICS_PASSWORD/g\" /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml && \
        /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus"
    depends_on:
      - app

volumes:
  postgres_data:
  prometheus_data:
